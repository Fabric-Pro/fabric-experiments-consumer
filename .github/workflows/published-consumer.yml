name: Published package consumer

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '11 8 * * *'
  workflow_dispatch:

jobs:
  local-consumer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          # Exercise the documented lower Node 22 boundary, before native
          # TypeScript stripping became implicit.
          node-version: 22.13.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:published
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: published-consumer-evidence-${{ matrix.os }}
          path: reports/
          if-no-files-found: error
