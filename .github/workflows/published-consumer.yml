name: Published package consumer

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '11 8 * * *'
  workflow_dispatch:

jobs:
  local-consumer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:published
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: published-consumer-evidence
          path: reports/
          if-no-files-found: error
